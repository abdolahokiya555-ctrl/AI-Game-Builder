name: ai_game_builder
description: تطبيق ذكاء اصطناعي متكامل لإنشاء الألعاب والتطبيقات

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.2.0

  # UI
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.5
  lottie: ^2.4.0
  cached_network_image: ^3.3.0

  # State Management
  provider: ^6.0.5

  # API
  http: ^1.1.0
  dio: ^5.3.1

  # Storage
  shared_preferences: ^2.2.1
  hive: ^2.2.3

  # Utilities
  intl: ^0.18.1
  uuid: ^4.0.0
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Regular.ttf
        - asset: assets/fonts/Almarai-Bold.ttf
          weight: 700
